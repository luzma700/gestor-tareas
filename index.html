<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Gestor de Tareas</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>📝 Gestor de Tareas</h1>
            <p>Organiza tus tareas diarias de manera eficiente</p>
        </header>

        <!-- FORMULARIO -->
        <section class="form-section">
            <h2>Agregar Nueva Tarea</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="title">Título *</label>
                    <input type="text" id="title" placeholder="Ej: Comprar víveres" required>
                    <small class="error-message" id="titleError"></small>
                </div>

                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" placeholder="Describe la tarea" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Categoría *</label>
                        <select id="category" required>
                            <option value="">Selecciona...</option>
                            <option value="personal">👤 Personal</option>
                            <option value="trabajo">💼 Trabajo</option>
                            <option value="estudio">📚 Estudio</option>
                            <option value="hogar">🏠 Hogar</option>
                        </select>
                        <small class="error-message" id="categoryError"></small>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Fecha Límite *</label>
                        <input type="date" id="dueDate" required>
                        <small class="error-message" id="dueDateError"></small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmTitle">Confirmar Título *</label>
                    <input type="text" id="confirmTitle" placeholder="Escribe nuevamente el título" required>
                    <small class="error-message" id="confirmError"></small>
                </div>

                <button type="submit" class="btn-primary">➕ Agregar Tarea</button>
            </form>
        </section>

        <!-- LISTA DE TAREAS -->
        <section class="tasks-section">
            <div class="tasks-header">
                <h2>Mis Tareas</h2>
                <div class="task-filters">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="pending">Pendientes</button>
                    <button class="filter-btn" data-filter="completed">Completadas</button>
                </div>
            </div>
            <div id="taskList" class="task-list">
                <!-- Las tareas se generarán dinámicamente aquí -->
            </div>
            <div id="emptyMessage" class="empty-message">
                <p>🎉 No tienes tareas pendientes</p>
                <p class="sub-message">¡Agrega tu primera tarea!</p>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
